<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Native splash screen icon — transparent background (app.json backgroundColor fills with #070714).
    Glyph matches AnimatedSplash first frame so the native→JS transition is seamless.
    resizeMode: "contain" in app.json — on a 375pt screen this SVG scales to 375pt wide,
    making the glyph appear at ~160pt diameter (AnimatedSplash starts at scale 0.82 ≈ 165pt).
  -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Soft glow -->
  <circle cx="512" cy="512" r="250" fill="#F5C842" filter="url(#glow)" opacity="0.22"/>

  <!-- Outer ring (mirrors AnimatedSplash ring at r=104 in 220px SVG → r=484 in 1024px) -->
  <circle cx="512" cy="512" r="484" fill="none" stroke="#F5C842" stroke-width="1.5" stroke-opacity="0.20"/>

  <!-- Violet depth layer -->
  <polygon
    points="512,282 547.2,427 674.6,349.4 597,476.8 742,512 597,547.2 674.6,674.6 547.2,597 512,742 476.8,597 349.4,674.6 427,547.2 282,512 427,476.8 349.4,349.4 476.8,427"
    fill="#8B5CF6"
    opacity="0.22"
    transform="scale(1.06) translate(-30.7,-30.7)"
  />

  <!-- Main gold star -->
  <polygon
    points="512,282 547.2,427 674.6,349.4 597,476.8 742,512 597,547.2 674.6,674.6 547.2,597 512,742 476.8,597 349.4,674.6 427,547.2 282,512 427,476.8 349.4,349.4 476.8,427"
    fill="#F5C842"
  />

  <!-- Rim highlight -->
  <polygon
    points="512,278 547.2,423 678.6,345.4 598.6,474.8 746,512 598.6,549.2 678.6,678.6 547.2,601 512,746 476.8,601 345.4,678.6 425,549.2 278,512 425,474.8 345.4,345.4 476.8,423"
    fill="none"
    stroke="#F0EEFF"
    stroke-width="2"
    stroke-opacity="0.18"
    stroke-linejoin="round"
  />

  <!-- Center dot -->
  <circle cx="512" cy="512" r="26" fill="#F5C842"/>
  <circle cx="512" cy="512" r="9"  fill="#F0EEFF" fill-opacity="0.40"/>
</svg>
